<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Humanizer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    keyframes: {
                        slideIn: {
                            '0%': { opacity: 0, transform: 'translateX(100%)' },
                            '100%': { opacity: 1, transform: 'translateX(0)' },
                        },
                        fadeOut: {
                            '0%': { opacity: 1, transform: 'translateY(0)' },
                            '100%': { opacity: 0, transform: 'translateY(10px)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-4px)' }
                        }
                    },
                    animation: {
                        'slide-in': 'slideIn 0.3s ease-out forwards',
                        'fade-out': 'fadeOut 0.3s ease-in forwards',
                        'float': 'float 3s ease-in-out infinite',
                        'float-fast': 'float 1.5s ease-in-out infinite',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center transition-colors duration-300 shadow-sm relative z-10">
        <div class="flex items-center gap-2">
            <svg class="h-9 w-auto text-slate-800 dark:text-slate-100 drop-shadow-sm" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <g class="animate-float">
                    <ellipse cx="40" cy="30" rx="7" ry="7">
                        <animate attributeName="ry" values="7;7;0.5;7;7" keyTimes="0;0.9;0.93;0.96;1" dur="3.5s" repeatCount="indefinite"/>
                    </ellipse>
                    <ellipse cx="80" cy="30" rx="7" ry="7">
                        <animate attributeName="ry" values="7;7;0.5;7;7" keyTimes="0;0.9;0.93;0.96;1" dur="3.5s" repeatCount="indefinite"/>
                    </ellipse>
                    <path d="M25 50 Q60 75 95 50 Q60 60 25 50Z" fill="#E85A5A"/>
                </g>
            </svg>
            <span class="text-xl font-bold tracking-tight text-indigo-600 dark:text-indigo-400">Humanizer</span>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="https://veerrajpoot.com" target="_blank" class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition-colors">Made by Veer</a>
            
            <button id="themeToggle" class="px-3 py-1.5 text-xs font-medium border border-slate-200 dark:border-slate-600 rounded-md bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                🦇 Vampire Mode (Dark)
            </button>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-4xl mx-auto p-6 flex flex-col gap-6 relative z-0">
        
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl flex flex-col overflow-hidden transition-colors duration-300 shadow-sm">
            <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 text-sm font-medium text-slate-500 dark:text-slate-400">
                Configure & Input
            </div>
            
            <div class="p-6 flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    <label for="tokenInput" class="text-sm font-medium">Authentication Token</label>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="tokenInput" placeholder="eyJhbGciOiJIUzUxMiJ9..." 
                            class="flex-grow px-4 py-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all dark:focus:ring-indigo-400/20 dark:focus:border-indigo-400">
                        <button id="getTokenBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors whitespace-nowrap">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.67-5.67"/></svg>
                            Refresh Token
                        </button>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-end">
                        <label for="promptInput" class="text-sm font-medium">Original Text</label>
                        <span id="inputScanBadge" class="hidden transition-all"></span>
                    </div>
                    <textarea id="promptInput" placeholder="Paste your AI-generated text here to humanize it..." 
                        class="w-full min-h-[200px] px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all resize-y dark:focus:ring-indigo-400/20 dark:focus:border-indigo-400"></textarea>
                </div>

                <div class="flex gap-3 pt-1">
                    <button id="scanInputBtn" class="flex items-center justify-center gap-2 px-6 py-3.5 bg-indigo-50/50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800/60 text-indigo-700 dark:text-indigo-400 rounded-lg font-medium hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-colors whitespace-nowrap disabled:opacity-60 disabled:cursor-not-allowed">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Scan AI
                    </button>
                    <button id="submitBtn" class="flex-grow flex items-center justify-center gap-2 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Humanize Text
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl flex flex-col overflow-hidden transition-colors duration-300 shadow-sm min-h-[300px]">
            <div class="px-6 py-3 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400">Result</span>
                <div class="flex items-center gap-4">
                    <span id="outputScanBadge" class="hidden transition-all"></span>
                    
                    <button id="scanOutputBtn" disabled class="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-50/50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800/60 text-indigo-700 dark:text-indigo-400 rounded-md text-sm font-medium hover:bg-indigo-100 dark:hover:bg-indigo-900/40 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Scan AI
                    </button>
                    
                    <div class="w-px h-4 bg-slate-300 dark:bg-slate-600"></div>
                    
                    <button id="copyBtn" disabled class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                        Copy Text
                    </button>
                </div>
            </div>
            
            <div class="p-6 flex-grow flex flex-col relative">
                <div id="output" class="text-sm leading-relaxed whitespace-pre-wrap flex-grow overflow-y-auto">
                    <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 gap-3" id="emptyState">
                        <svg class="h-16 w-auto opacity-30 text-current" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <ellipse cx="40" cy="30" rx="7" ry="1" />
                            <ellipse cx="80" cy="30" rx="7" ry="1" />
                            <path d="M25 50 Q60 65 95 50 Q60 55 25 50Z" fill="currentColor"/>
                        </svg>
                        <p>Your humanized text will appear here.</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-3 z-50 pointer-events-none"></div>

    <script>
        // Loading animation component string to be injected when buttons are busy
        const loadingFace = `
            <svg class="h-5 w-auto animate-float-fast text-current" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                <ellipse cx="40" cy="30" rx="8" ry="8"><animate attributeName="ry" values="8;8;0.5;8;8" keyTimes="0;0.8;0.85;0.9;1" dur="1.5s" repeatCount="indefinite"/></ellipse>
                <ellipse cx="80" cy="30" rx="8" ry="8"><animate attributeName="ry" values="8;8;0.5;8;8" keyTimes="0;0.8;0.85;0.9;1" dur="1.5s" repeatCount="indefinite"/></ellipse>
                <path d="M25 50 Q60 75 95 50 Q60 60 25 50Z" fill="#E85A5A"/>
            </svg>
        `;

        // --- Theme Logic ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        let isDark = localStorage.getItem('theme') === 'dark';

        function updateThemeUI() {
            if (isDark) {
                htmlElement.classList.add('dark');
                themeToggleBtn.innerHTML = '☀️ My Eyes! (Light)';
            } else {
                htmlElement.classList.remove('dark');
                themeToggleBtn.innerHTML = '🦇 Vampire Mode (Dark)';
            }
        }
        
        updateThemeUI();
        themeToggleBtn.addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI();
        });

        // --- Toast Utility ---
        function showToast(message, type = 'default') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let baseClasses = "animate-slide-in flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border-l-4 bg-white dark:bg-slate-800 text-slate-900 dark:text-white text-sm font-medium pointer-events-auto border-t border-r border-b border-t-slate-100 border-r-slate-100 border-b-slate-100 dark:border-t-slate-700 dark:border-r-slate-700 dark:border-b-slate-700";
            let icon = '';
            let typeClass = '';

            if (type === 'error') {
                icon = '<svg width="18" height="18" class="text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                typeClass = 'border-l-red-500';
            } else if (type === 'success') {
                icon = '<svg width="18" height="18" class="text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                typeClass = 'border-l-green-500';
            } else {
                icon = '<svg width="18" height="18" class="text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
                typeClass = 'border-l-indigo-500';
            }

            toast.className = `${baseClasses} ${typeClass}`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('animate-slide-in');
                toast.classList.add('animate-fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- GPTZero AI Scan Logic ---
        async function scanTextForAI(text, badgeElement, btnElement) {
            if (!text || !text.trim()) {
                showToast("No text to scan!", "error");
                return;
            }

            const originalBtnHtml = btnElement.innerHTML;
            btnElement.disabled = true;
            btnElement.innerHTML = `${loadingFace} <span class="ml-1">Scanning...</span>`;
            badgeElement.classList.add('hidden');

            try {
                const scanId = crypto.randomUUID ? crypto.randomUUID() : "19abb6c4-22ae-4377-a878-0087030c9a45";
                
                const response = await fetch('https://api.gptzero.me/v3/ai/text', {
                    method: 'POST',
                    headers: {
                        'Accept': '*/*',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        scanId: scanId,
                        multilingual: true,
                        document: text,
                        interpretability_required: false
                    })
                });

                if (!response.ok) throw new Error(`Server returned ${response.status}`);

                const data = await response.json();
                
                const aiProb = data?.documents?.[0]?.class_probabilities?.ai || 0;
                const aiPercent = Math.round(aiProb * 100);
                
                badgeElement.classList.remove('hidden');
                
                if (aiPercent > 50) {
                    badgeElement.className = 'text-xs font-semibold px-2.5 py-1 rounded-md bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400';
                    badgeElement.innerHTML = `🤖 ${aiPercent}% AI`;
                } else {
                    const humanPercent = 100 - aiPercent;
                    badgeElement.className = 'text-xs font-semibold px-2.5 py-1 rounded-md bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400';
                    badgeElement.innerHTML = `🧑 ${humanPercent}% Human`;
                }

            } catch (error) {
                console.error("Scan Error: ", error);
                showToast(`Scan Failed. CORS or Network error.`, 'error');
            } finally {
                btnElement.disabled = false;
                btnElement.innerHTML = originalBtnHtml;
            }
        }

        document.getElementById('scanInputBtn').addEventListener('click', () => {
            const text = document.getElementById('promptInput').value;
            const badge = document.getElementById('inputScanBadge');
            const btn = document.getElementById('scanInputBtn');
            scanTextForAI(text, badge, btn);
        });

        document.getElementById('scanOutputBtn').addEventListener('click', () => {
            const badge = document.getElementById('outputScanBadge');
            const btn = document.getElementById('scanOutputBtn');
            scanTextForAI(currentOutputText, badge, btn);
        });

        // --- Core App Logic ---
        const LOCAL_STORAGE_KEY = 'aihumanize_saved_token';
        let currentOutputText = "";

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (currentOutputText) {
                navigator.clipboard.writeText(currentOutputText).then(() => {
                    showToast('Text copied to clipboard!', 'success');
                }).catch(() => {
                    showToast('Failed to copy text.', 'error');
                });
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (savedToken) {
                document.getElementById('tokenInput').value = savedToken;
            }
        });

        document.getElementById('getTokenBtn').addEventListener('click', async () => {
            const getTokenBtn = document.getElementById('getTokenBtn');
            const tokenInput = document.getElementById('tokenInput');

            getTokenBtn.disabled = true;
            const originalText = getTokenBtn.innerHTML;
            getTokenBtn.innerHTML = `${loadingFace} <span class="ml-1">Fetching...</span>`;

            try {
                const response = await fetch('https://aihumanize.io/dev/webuser/getLoginData', {
                    method: 'GET',
                    headers: { 'Accept': '*/*', 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error(`HTTP Error ${response.status}`);

                const result = await response.json();

                if (result.code === 0 && result.data && result.data.token) {
                    tokenInput.value = result.data.token;
                    localStorage.setItem(LOCAL_STORAGE_KEY, result.data.token);
                    showToast('New token generated and saved.', 'success');
                } else {
                    throw new Error('Invalid token response format.');
                }
            } catch (error) {
                console.error("Fetch Error: ", error);
                showToast(`Failed to fetch token: ${error.message}`, 'error');
            } finally {
                getTokenBtn.disabled = false;
                getTokenBtn.innerHTML = originalText;
            }
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const promptText = document.getElementById('promptInput').value.trim();
            const token = document.getElementById('tokenInput').value.trim();
            const outputDiv = document.getElementById('output');
            const emptyState = document.getElementById('emptyState');
            const submitBtn = document.getElementById('submitBtn');
            const copyBtn = document.getElementById('copyBtn');
            const scanOutputBtn = document.getElementById('scanOutputBtn');
            const outputScanBadge = document.getElementById('outputScanBadge');

            if (!token) {
                showToast("Please provide an authentication token.", "error");
                return;
            }
            if (!promptText) {
                showToast("Please enter some text to humanize.", "error");
                return;
            }

            localStorage.setItem(LOCAL_STORAGE_KEY, token);

            if (emptyState) emptyState.style.display = 'none';
            outputDiv.textContent = '';
            currentOutputText = '';
            outputScanBadge.classList.add('hidden');
            
            submitBtn.disabled = true;
            copyBtn.disabled = true;
            scanOutputBtn.disabled = true;
            submitBtn.innerHTML = `${loadingFace} <span class="ml-1">Processing...</span>`;

            const payload = {
                prompt: promptText,
                token: token,
                auto: 0,
                cjtype: 0,
                model: 1
            };

            try {
                const response = await fetch('https://aihumanize.io/dev/outstream', {
                    method: 'POST',
                    headers: { 'Accept': '*/*', 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`Server returned ${response.status}`);
                if (!response.body) throw new Error('Stream not supported by browser.');

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let done = false;
                let buffer = '';

                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;

                    if (value) {
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); 

                        for (const line of lines) {
                            const trimmedLine = line.trim();
                            if (trimmedLine.startsWith('data: ')) {
                                const jsonStr = trimmedLine.substring(6);
                                try {
                                    const dataObj = JSON.parse(jsonStr);
                                    if (dataObj.type === 'success' && dataObj.msg) {
                                        currentOutputText += dataObj.msg;
                                        outputDiv.textContent = currentOutputText;
                                        outputDiv.scrollTop = outputDiv.scrollHeight;
                                    } else if (dataObj.type === 'DONE') {
                                        done = true;
                                        showToast("Process completed successfully.", "success");
                                        copyBtn.disabled = false;
                                        scanOutputBtn.disabled = false;
                                    }
                                } catch (e) {
                                    // Ignore partial JSON
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                console.error("Stream Error: ", error);
                showToast(`Request Failed: ${error.message}`, 'error');
                outputDiv.textContent = currentOutputText + `\n\n[Process Interrupted: ${error.message}]`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Humanize Text';
            }
        });
    </script>
</body>
</html>
